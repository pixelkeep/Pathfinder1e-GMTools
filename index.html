<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF1e GM Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="monsters.js"></script>
<style>
:root {
  --gold: #c8952a;
  --gold-dim: #8B5E3C;
  --bg: #0d0f0e;
  --bg2: #111310;
  --bg3: #0f1110;
  --border: #2a2018;
  --text: #d4c5a9;
  --muted: #6a5535;
  --dim: #3a2a18;
  --red: #c0392b;
  --green: #2ecc71;
  --blue: #4a9eff;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:15px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:inherit;font-size:13px;padding:6px 9px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold-dim)}
select option{background:var(--bg)}
button{cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;border-radius:5px;padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
button:hover{border-color:var(--gold-dim);color:var(--text)}
button.gold{background:rgba(139,94,60,.2);border-color:var(--gold-dim);color:var(--gold)}
button.gold:hover{background:rgba(139,94,60,.35)}
button.green{background:rgba(30,60,30,.3);border-color:#3a5a3a;color:#7ab87a}
button.red{background:rgba(80,20,20,.2);border-color:#4a1818;color:var(--red)}
button.blue{background:rgba(30,50,80,.3);border-color:#3a5a8a;color:#7aaad8}
button:disabled{opacity:.4;cursor:not-allowed}
label{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:3px}
.cinzel{font-family:'Cinzel',serif}
.hidden{display:none!important}
/* Layout */
#app{display:flex;flex-direction:column;height:100vh}
#topbar{display:flex;align-items:stretch;height:46px;background:linear-gradient(135deg,#1a0e05,#0d0f0e);border-bottom:1px solid var(--border);padding:0 16px;gap:6px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;padding-right:16px;border-right:1px solid var(--border);margin-right:4px}
.logo-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.08em;line-height:1;text-shadow:0 0 20px rgba(200,149,42,.4)}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase}
.mode-btns{display:flex;align-items:center}
.mode-btn{border-radius:0;border:1px solid var(--border);padding:5px 14px;font-size:11px;letter-spacing:.06em;color:var(--muted)}
.mode-btn:first-child{border-radius:5px 0 0 5px}
.mode-btn:last-child{border-radius:0 5px 5px 0}
.mode-btn.active{background:rgba(200,149,42,.15);border-color:var(--gold-dim);color:var(--gold)}
.context-hint{display:flex;align-items:center;font-size:11px;color:var(--muted);font-style:italic;margin-left:8px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#body{display:flex;flex:1;overflow:hidden}
/* Sidebar */
#sidebar{width:168px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:#0c0e0d}
.sidebar-section-label{padding:10px 12px 6px;border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:9px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
#steps{flex:1;overflow-y:auto;padding:6px 0}
.step-btn{width:100%;text-align:left;padding:10px 12px;background:transparent;border:none;border-left:3px solid transparent;border-radius:0;display:flex;align-items:flex-start;gap:9px;color:var(--text)}
.step-btn:hover{background:rgba(255,255,255,.02)}
.step-btn.active{background:rgba(200,149,42,.1);border-left-color:var(--gold)}
.step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:11px;font-weight:700;flex-shrink:0;background:#1e1a10;color:var(--muted);margin-top:1px}
.step-btn.active .step-num{background:var(--gold);color:#0d0f0e}
.step-connector{width:1px;height:12px;background:var(--border);margin:3px 0 0 9px}
.step-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.05em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step-btn.active .step-label{color:var(--gold)}
.step-sub{font-size:10px;color:var(--dim);margin-top:1px;line-height:1.3}
.sidebar-bottom{padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.module-header{padding:8px 16px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,#141210,#0f1110);display:flex;align-items:center;gap:8px;flex-shrink:0}
.module-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:.08em}
.module-sub{font-size:10px;color:var(--muted)}
.module-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
/* Panels */
.panel{background:var(--bg2);border-radius:0}
.panel-head{background:linear-gradient(90deg,#1a1208,#111310);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:8px}
.panel-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
/* Initiative tracker */
#it-wrap{display:flex;flex-direction:column;height:100%}
#it-toolbar{padding:9px 16px;border-bottom:1px solid var(--border);display:flex;gap:7px;align-items:center;background:var(--bg);flex-shrink:0}
#it-log{background:#0a0c0b;border-bottom:1px solid var(--border);height:90px;overflow-y:auto;padding:5px 16px;flex-shrink:0}
.log-entry{font-size:11px;color:var(--muted);font-family:monospace;border-bottom:1px solid var(--border);padding:2px 0}
#it-active-banner{background:rgba(200,149,42,.07);border-bottom:1px solid rgba(200,149,42,.2);padding:7px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#it-list{flex:1;overflow-y:auto;padding:10px 16px}
#it-add-form{border-top:1px solid var(--border);padding:10px 16px;background:var(--bg);flex-shrink:0}
.it-add-grid{display:grid;grid-template-columns:1fr 75px 55px 65px 65px 70px;gap:7px;align-items:end}
.combatant-row{display:grid;grid-template-columns:36px 1fr 52px 88px 105px 46px auto;gap:7px;align-items:center;padding:8px 10px;border-radius:7px;margin-bottom:4px;border:1px solid #1e1812;background:rgba(255,255,255,.01);transition:all .2s}
.combatant-row.active-turn{background:rgba(200,149,42,.07);border-color:var(--gold-dim)}
.combatant-row.dead{opacity:.5;border-color:#4a1818}
.init-box{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:15px;font-weight:700;cursor:pointer;background:#111;border:1px solid var(--border);color:#8a7050;flex-shrink:0}
.init-box.active{background:rgba(200,149,42,.15);border-color:var(--gold);color:var(--gold)}
.hp-bar-wrap{height:3px;background:#1a1a1a;border-radius:2px;margin-top:3px;overflow:hidden}
.hp-bar{height:100%;border-radius:2px;transition:width .3s}
.cond-tag{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:3px;font-size:10px;margin:1px 2px 1px 0;cursor:pointer;border:1px solid}
.cond-panel{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;padding:6px;background:var(--bg);border-radius:5px;border:1px solid var(--border)}
.dmg-input{width:44px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 4px;color:var(--text);font-size:12px;text-align:center;outline:none}
/* Monster quickview */
#mq-wrap{display:flex;height:100%;overflow:hidden}
#mq-sidebar{width:275px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg3)}
#mq-list{flex:1;overflow-y:auto}
.mq-item{padding:7px 11px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;transition:all .1s}
.mq-item:hover{background:rgba(255,255,255,.02)}
.mq-item.selected{background:rgba(200,149,42,.08);border-left-color:var(--gold)}
.cr-badge{font-family:'Cinzel',serif;font-size:10px;padding:1px 5px;border-radius:3px;background:#1a1208;border:1px solid var(--border);color:var(--gold);min-width:26px;text-align:center;flex-shrink:0}
#mq-detail{flex:1;overflow-y:auto;padding:18px 22px}
.stat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 9px;text-align:center;min-width:50px}
.stat-box-label{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.stat-box-val{font-family:'Cinzel',serif;font-size:14px;color:var(--text);line-height:1.2}
.stat-box-mod{font-size:10px;color:var(--muted)}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:11px 0}
/* Encounter builder */
#eb-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
#eb-toolbar{padding:7px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;background:var(--bg);flex-shrink:0}
#eb-body{flex:1;display:flex;overflow:hidden}
.eb-col{display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg3);overflow:hidden}
.eb-list{flex:1;overflow-y:auto;padding:6px}
.eb-card{padding:8px 10px;border-radius:6px;margin-bottom:4px;cursor:pointer;background:transparent;border:1px solid var(--border);transition:all .15s}
.eb-card:hover{border-color:var(--gold-dim)}
.eb-card.selected{background:rgba(200,149,42,.08);border-color:var(--gold-dim)}
.eb-card-title{font-family:'Cinzel',serif;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eb-card.selected .eb-card-title{color:var(--gold)}
#eb-detail{flex:1;display:flex;flex-direction:column;overflow:hidden}
#eb-right{width:255px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg3)}
.diff-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-family:'Cinzel',serif;letter-spacing:.08em}
.xp-bar-wrap{height:7px;background:#1a1a1a;border-radius:3px;position:relative;overflow:visible;margin:8px 0 5px}
.xp-bar-fill{height:100%;border-radius:3px;transition:width .4s;min-width:0}
.xp-thresh-mark{position:absolute;top:-2px;width:1px;height:11px;z-index:2}
.monster-row{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:4px}
/* NPC tracker */
#npc-wrap{display:flex;height:100%;overflow:hidden}
#npc-sidebar{width:285px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg3)}
#npc-list{flex:1;overflow-y:auto}
.npc-item{padding:8px 11px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid var(--border);transition:all .1s}
.npc-item:hover{background:rgba(255,255,255,.02)}
.npc-item.selected{background:rgba(200,149,42,.08);border-left-color:var(--gold)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
#npc-detail{flex:1;overflow:hidden;display:flex;flex-direction:column}
.npc-detail-body{flex:1;overflow-y:auto;padding:13px 15px}
.status-bar{display:flex;gap:5px;padding:8px 15px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;flex-wrap:wrap}
.status-quick-btn{padding:4px 10px;border-radius:5px;font-size:10px;font-family:'Cinzel',serif;letter-spacing:.05em}
.rel-badge{font-size:9px;padding:1px 5px;border-radius:3px}
.tag-pill{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;font-size:10px;background:#1e1a10;border:1px solid var(--border);color:#8a7050;margin:2px 3px 2px 0}
/* Autocomplete */
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--gold-dim);border-radius:5px;z-index:50;max-height:220px;overflow-y:auto;margin-top:3px}
.autocomplete-item{padding:7px 11px;cursor:pointer;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border)}
.autocomplete-item:hover{background:rgba(200,149,42,.07)}
/* Toast */
#toast{position:fixed;top:14px;right:14px;background:#1a1a1a;border-radius:7px;padding:9px 16px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.06em;box-shadow:0 4px 20px rgba(0,0,0,.6);z-index:1000;transition:opacity .3s;opacity:0;pointer-events:none}
#toast.show{opacity:1}
/* Help modal */
#help-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
#help-modal.show{display:flex}
.help-box{background:#141210;border:1px solid var(--gold-dim);border-radius:10px;padding:22px 26px;max-width:400px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.8)}
/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim);text-align:center;padding:20px}
.empty-icon{font-size:42px;margin-bottom:14px;opacity:.3}
.empty-title{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.1em}
.empty-sub{font-size:12px;margin-top:8px;color:#2a1e10}
/* Tabs in EB right panel */
.tab-row{display:flex;border-bottom:1px solid var(--border)}
.tab-btn{flex:1;padding:8px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:11px;border-radius:0}
.tab-btn.active{border-bottom-color:var(--gold);color:var(--gold);background:rgba(200,149,42,.05)}

/* Session Notes */
#notes-wrap{display:flex;height:100%;overflow:hidden}
#notes-sidebar{width:200px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg3)}
#notes-list{flex:1;overflow-y:auto}
.notes-session-item{padding:8px 11px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid var(--border);transition:all .1s}
.notes-session-item:hover{background:rgba(255,255,255,.02)}
.notes-session-item.selected{background:rgba(200,149,42,.08);border-left-color:var(--gold)}
.notes-session-title{font-family:'Cinzel',serif;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notes-session-item.selected .notes-session-title{color:var(--gold)}
.notes-session-date{font-size:10px;color:var(--dim);margin-top:2px}
#notes-detail{flex:1;display:flex;flex-direction:column;overflow:hidden}
.notes-tab-row{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.notes-tab{flex:1;padding:8px 6px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.05em;cursor:pointer;border-radius:0}
.notes-tab.active{border-bottom-color:var(--gold);color:var(--gold);background:rgba(200,149,42,.05)}
.notes-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.notes-textarea{width:100%;flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:14px;line-height:1.7;resize:none;outline:none;min-height:120px;box-sizing:border-box;transition:border-color .15s}
.notes-textarea:focus{border-color:var(--gold-dim)}
.quest-item{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;transition:border-color .15s}
.quest-item:hover{border-color:var(--gold-dim)}
.quest-check{width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:var(--gold);cursor:pointer}
.quest-text{flex:1;background:transparent;border:none;color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:13px;outline:none;line-height:1.5;resize:none;padding:0}
.quest-text.done{text-decoration:line-through;color:var(--muted)}
.quest-del{background:transparent;border:none;color:#4a2020;cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0;font-family:inherit}
.todo-priority{font-size:10px;padding:1px 6px;border-radius:3px;font-family:'Cinzel',serif;letter-spacing:.05em;flex-shrink:0;cursor:pointer;border:1px solid}

/* Misc */
a{color:#4a6a8a;text-decoration:none}
a:hover{color:#7aaad8}
.section-label{font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.mb8{margin-bottom:8px}
.aon-link{font-size:11px}
textarea{width:100%;resize:vertical;line-height:1.5;min-height:60px}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <span style="font-size:18px">⚔️</span>
      <div>
        <div class="logo-title">GM COMMAND</div>
        <div class="logo-sub" id="monster-count-label">Pathfinder 1e</div>
      </div>
    </div>
    <div class="mode-btns">
      <button class="mode-btn active" id="btn-prep" onclick="setMode('prep')">📋 Voorbereiding</button>
      <button class="mode-btn" id="btn-play" onclick="setMode('play')">🎲 Spelen</button>
    </div>
    <div class="context-hint" id="context-hint">Bereid je sessie voor: party → sessie → encounters → NPCs</div>
    <div class="topbar-right">
      <button onclick="showHelp()" style="padding:4px 10px;font-size:11px">? Help</button>
      <a href="https://aonprd.com" target="_blank" style="font-size:10px;letter-spacing:.1em">AoN ↗</a>
    </div>
  </div>
  <div id="body">
    <div id="sidebar">
      <div class="sidebar-section-label" id="sidebar-section-label">Voorbereiding</div>
      <div id="steps"></div>
      <div class="sidebar-bottom">
        <button id="mode-action-btn" class="green" style="width:100%;font-size:10px;padding:7px 8px" onclick="onModeActionClick()">🎲 Start sessie →</button>
      </div>
    </div>
    <div id="main">
      <div class="module-header">
        <span id="mod-icon" style="font-size:14px">⚔️</span>
        <div>
          <div class="module-title" id="mod-title">Initiative Tracker</div>
          <div class="module-sub" id="mod-sub">Initiative & HP bijhouden</div>
        </div>
        <button onclick="showHelp()" style="margin-left:auto;padding:3px 9px;font-size:10px;opacity:.7">? Help</button>
      </div>
      <div class="module-content" id="module-content"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="help-modal" onclick="this.classList.remove('show')">
  <div class="help-box" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:13px">
      <span style="font-size:18px">💡</span>
      <div class="cinzel" style="font-size:14px;color:var(--gold)" id="help-title">Help</div>
      <button onclick="document.getElementById('help-modal').classList.remove('show')" style="margin-left:auto;background:transparent;border:none;color:var(--muted);font-size:17px;padding:0;font-family:inherit">✕</button>
    </div>
    <div style="font-size:14px;line-height:1.7;color:var(--text)" id="help-body"></div>
    <button class="gold" onclick="document.getElementById('help-modal').classList.remove('show')" style="margin-top:14px;width:100%">Begrepen</button>
  </div>
</div>

<script>
'use strict';

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const CONDITIONS = [
  {id:'bleed',label:'Bleed',color:'#c0392b'},{id:'blinded',label:'Blinded',color:'#7f8c8d'},
  {id:'confused',label:'Confused',color:'#8e44ad'},{id:'cowering',label:'Cowering',color:'#e67e22'},
  {id:'dazed',label:'Dazed',color:'#95a5a6'},{id:'dazzled',label:'Dazzled',color:'#f1c40f'},
  {id:'deafened',label:'Deafened',color:'#7f8c8d'},{id:'dying',label:'Dying',color:'#e74c3c'},
  {id:'entangled',label:'Entangled',color:'#27ae60'},{id:'exhausted',label:'Exhausted',color:'#e67e22'},
  {id:'fascinated',label:'Fascinated',color:'#9b59b6'},{id:'fatigued',label:'Fatigued',color:'#d35400'},
  {id:'flat-footed',label:'Flat-Footed',color:'#95a5a6'},{id:'frightened',label:'Frightened',color:'#e74c3c'},

// ─── XP CALCULATIONS ─────────────────────────────────────────────────────────
function calcRawXP(monsters) {
  return (monsters||[]).reduce((s,m) => s+(CR_XP[m.cr]||0)*(m.count||1), 0);
}
function xpMult(n) {
  if(n<=1)return 1; if(n===2)return 1.5; if(n<=6)return 2;
  if(n<=10)return 2.5; if(n<=14)return 3; return 4;
}
function monCount(monsters) { return (monsters||[]).reduce((s,m)=>s+(m.count||1),0); }
function adjXP(monsters) { const r=calcRawXP(monsters); return Math.round(r*xpMult(monCount(monsters))); }
function avgLevel(party) {
  if(!party||!party.members||!party.members.length) return 1;
  return Math.round(party.members.reduce((s,m)=>s+(m.level||1),0)/party.members.length);
}
function getDiff(xp, party) {
  if(!party||!party.members||!party.members.length) return null;
  const lvl = Math.min(20,Math.max(1,avgLevel(party)));
  const t = XP_THRESH[lvl]; if(!t) return null;
  const pp = xp/party.members.length;
  if(pp<t[0]) return {label:'Trivial',color:'#5a5a6a'};
  if(pp<t[1]) return {label:'Easy',color:DIFF_COLORS[0]};
  if(pp<t[2]) return {label:'Medium',color:DIFF_COLORS[1]};
  if(pp<t[3]) return {label:'Hard',color:DIFF_COLORS[2]};
  return {label:'Epic',color:DIFF_COLORS[3]};
}
function getThresholds(party) {
  if(!party||!party.members||!party.members.length) return null;
  const lvl = Math.min(20,Math.max(1,avgLevel(party)));
  const t = XP_THRESH[lvl]; if(!t) return null;
  return t.map(v=>v*party.members.length);
}

const appState = {
  mode: load('pf1e-mode')||'prep',
  activeModule: load('pf1e-tab')||'initiative'
};

function setMode(m) {
  appState.mode = m;
  save('pf1e-mode',m);
  const steps = WORKFLOW[m];
  // Switch to first step's module if current doesn't exist in new mode
  const exists = steps.some(s=>s.module===appState.activeModule);
  if(!exists) navigateTo(steps[0].module);
  else renderSidebar();
  updateTopbar();
}

function navigateTo(module) {
  appState.activeModule = module;
  save('pf1e-tab',module);
  renderSidebar();
  renderModule();
  updateModuleHeader();
}

function onModeActionClick() {
  if(appState.mode==='prep') { setMode('play'); navigateTo('initiative'); }
  else { setMode('prep'); navigateTo('encounters'); }
}

function updateTopbar() {
  document.getElementById('btn-prep').classList.toggle('active', appState.mode==='prep');
  document.getElementById('btn-play').classList.toggle('active', appState.mode==='play');
  document.getElementById('context-hint').textContent = appState.mode==='prep'
    ? 'Bereid je sessie voor: party → sessie → encounters → NPCs'
    : 'Je bent aan het spelen — combat, monsters opzoeken, NPCs bijhouden';
  document.getElementById('context-hint').style.color = appState.mode==='prep' ? 'var(--muted)' : '#7ab87a';
  document.getElementById('mode-action-btn').textContent = appState.mode==='prep' ? '🎲 Start sessie →' : '← Terug naar Prep';
  document.getElementById('mode-action-btn').className = appState.mode==='prep' ? 'green' : '';
  document.getElementById('mode-action-btn').style.cssText = 'width:100%;font-size:10px;padding:7px 8px';
  document.getElementById('sidebar-section-label').textContent = appState.mode==='prep' ? 'Voorbereiding' : 'Tijdens het Spel';
}

function renderSidebar() {
  const steps = WORKFLOW[appState.mode];
  let html = '';
  steps.forEach((step,i) => {
    const active = step.module === appState.activeModule || (step.key==='npc-play'&&appState.activeModule==='npcs');
    html += `<button class="step-btn${active?' active':''}" onclick="navigateTo('${step.module}')">
      <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">
        <div class="step-num">${i+1}</div>
        ${i<steps.length-1?'<div class="step-connector"></div>':''}

      <div style="min-width:0;flex:1">
        <div class="step-label">${step.icon} ${step.label}</div>
        <div class="step-sub">${step.sub}</div>
      </div>
    </button>`;
  });
  document.getElementById('steps').innerHTML = html;
}

function updateModuleHeader() {
  const steps = WORKFLOW[appState.mode];
  const step = steps.find(s=>s.module===appState.activeModule||(s.key==='npc-play'&&appState.activeModule==='npcs'));
  const labels = {initiative:'Initiative Tracker',monsters:'Monster Quickview',encounters:'Encounter Builder',npcs:'NPC Tracker'};
  const subs = {initiative:'Initiative & HP bijhouden',monsters:'Statblocks opzoeken',encounters:'Sessie & Encounter planning',npcs:'Personages bijhouden'};
  if(step) {
    document.getElementById('mod-icon').textContent = step.icon;
    document.getElementById('mod-title').textContent = labels[appState.activeModule]||step.label;
    document.getElementById('mod-sub').textContent = step.sub;
  } else {
    document.getElementById('mod-icon').textContent = '⚔️';
    document.getElementById('mod-title').textContent = labels[appState.activeModule]||appState.activeModule;
    document.getElementById('mod-sub').textContent = subs[appState.activeModule]||'';

}

        <button style="font-size:11px;padding:3px 7px" onclick="itToggleCondPanel('${c.id}')">▼ cond</button>
        <button class="red" style="font-size:11px;padding:3px 6px" onclick="itRemove('${c.id}')">✕</button>
        <div id="condpanel-${c.id}" class="hidden" style="width:100%"></div>
      </div>
    </div>`;
  }).join('');
}

function itRollAll() {
  IT.combatants = IT.combatants.map(c=>({...c, initiative:d20()+(c.initBonus||0)}));
  itLog('🎲 All initiatives rolled'); itSave(); itRefresh();
}
function itStart() {
  if(!IT.combatants.length) return;
  IT.combatants.sort((a,b)=>b.initiative-a.initiative);
  IT.activeIdx=0; IT.round=1; IT.started=true;
  itLog('═══ COMBAT GESTART ═══');
  itLog('Volgorde: '+IT.combatants.map(c=>`${c.name}(${c.initiative})`).join(', '));
  itSave(); itRefresh();
}
function itStop() { IT.started=false; IT.activeIdx=0; itLog('■ Combat gestopt'); itSave(); itRefresh(); }
function itNext() {
  const n=(IT.activeIdx+1)%IT.combatants.length;
  if(n===0){IT.round++;itLog(`─── Ronde ${IT.round} ───`);}
  IT.activeIdx=n;
  if(IT.combatants[n]) itLog(`Beurt: ${IT.combatants[n].name}`);
  itSave(); itRefresh();
}
function itReset() {
  if(!confirm('Reset encounter?')) return;
  IT.combatants=[]; IT.activeIdx=0; IT.round=1; IT.started=false;
  itSave(); itRefresh();
}
function itToggleLog() {
  IT.showLog=!IT.showLog;
  document.getElementById('it-log').classList.toggle('hidden',!IT.showLog);
}
let itRolledInit = null;
function itRollOne() {
  const bonus=parseInt(document.getElementById('it-bonus').value)||0;
  itRolledInit=d20()+bonus;
  document.getElementById('it-rolled').textContent='= '+itRolledInit;
}
function itAdd() {
  const name=document.getElementById('it-name').value.trim();
  if(!name) return;
  const bonus=parseInt(document.getElementById('it-bonus').value)||0;
  const init=itRolledInit!==null?itRolledInit:d20()+bonus;
  const c={id:uid(),name,type:document.getElementById('it-type').value,initBonus:bonus,initiative:init,
    hpMax:parseInt(document.getElementById('it-hp').value)||0,
    hpCurrent:parseInt(document.getElementById('it-hp').value)||0,
    ac:parseInt(document.getElementById('it-ac').value)||0,
    conScore:parseInt(document.getElementById('it-con').value)||10,conditions:[]};
  IT.combatants.push(c);
  itLog(`${c.name} (${c.type}) — Init ${c.initiative}`);
  document.getElementById('it-name').value='';
  document.getElementById('it-hp').value='';
  document.getElementById('it-ac').value='';
  document.getElementById('it-bonus').value='0';
  itRolledInit=null;
  document.getElementById('it-rolled').textContent='';
  itSave(); itRefresh();
  document.getElementById('it-name').focus();
}
function itRemove(id) {
  const c=IT.combatants.find(x=>x.id===id);
  IT.combatants=IT.combatants.filter(x=>x.id!==id);
  if(c) itLog(`${c.name} verwijderd`);
  itSave(); itRefresh();
}
function itApplyDmg(id) {
  const v=parseInt(document.getElementById('dmg-'+id)?.value||'0');
  if(!v||v<=0) return;
  IT.combatants=IT.combatants.map(c=>{ if(c.id!==id)return c; const nh=Math.max(-999,c.hpCurrent-v); itLog(`${c.name} −${v} HP → ${nh}`); return {...c,hpCurrent:nh}; });
  if(document.getElementById('dmg-'+id)) document.getElementById('dmg-'+id).value='';
  itSave(); itRefresh();
}
function itApplyHeal(id) {
  const v=parseInt(document.getElementById('heal-'+id)?.value||'0');
  if(!v||v<=0) return;
  IT.combatants=IT.combatants.map(c=>{ if(c.id!==id)return c; const nh=Math.min(c.hpMax||9999,c.hpCurrent+v); itLog(`${c.name} +${v} HP → ${nh}`); return {...c,hpCurrent:nh}; });
  if(document.getElementById('heal-'+id)) document.getElementById('heal-'+id).value='';
  itSave(); itRefresh();
}
function itEditInit(id) {
  const c=IT.combatants.find(x=>x.id===id); if(!c) return;
  const el=document.getElementById('ibox-'+id); if(!el) return;
  const inp=document.createElement('input');
  inp.value=c.initiative; inp.style.cssText='width:28px;background:transparent;border:none;color:var(--gold);font-family:Cinzel,serif;font-size:13px;text-align:center;outline:none';
  el.innerHTML=''; el.appendChild(inp); inp.focus(); inp.select();
  function commit(){ const v=parseInt(inp.value); if(!isNaN(v)){IT.combatants=IT.combatants.map(x=>x.id===id?{...x,initiative:v}:x); itLog(`${c.name} initiative → ${v}`); itSave();} itRefresh(); }
  inp.onblur=commit; inp.onkeydown=e=>{ if(e.key==='Enter')commit(); };
}
function itToggleCondPanel(id) {
  const panel=document.getElementById('condpanel-'+id); if(!panel) return;
  if(!panel.classList.contains('hidden')) { panel.classList.add('hidden'); return; }
  const c=IT.combatants.find(x=>x.id===id); if(!c) return;
  panel.innerHTML='<div class="cond-panel">'+CONDITIONS.map(cd=>{
    const active=(c.conditions||[]).includes(cd.id);
    return `<span class="cond-tag" style="color:${active?cd.color:'var(--dim)'};border-color:${active?cd.color+'66':'var(--border)'};background:${active?cd.color+'18':'transparent'};font-size:10px" onclick="itToggleCond('${id}','${cd.id}')">${esc(cd.label)}</span>`;
  }).join('')+'</div>';
  panel.classList.remove('hidden');
}
function itToggleCond(cid, condId) {
  IT.combatants=IT.combatants.map(c=>{ if(c.id!==cid)return c; const conds=c.conditions||[]; return {...c,conditions:conds.includes(condId)?conds.filter(x=>x!==condId):[...conds,condId]}; });
  itSave(); itRefresh();
  // re-open the panel
  const c=IT.combatants.find(x=>x.id===cid);
  if(c) { const panel=document.getElementById('condpanel-'+cid); if(panel&&!panel.classList.contains('hidden')) itToggleCondPanel(cid), itToggleCondPanel(cid); }
}

  </div>`;

function mqFilter() {
  MQ.query = document.getElementById('mq-search')?.value||'';
  MQ.filterCR = document.getElementById('mq-cr')?.value||'';
  MQ.filterType = document.getElementById('mq-type')?.value||'';
  MQ.filterSize = document.getElementById('mq-size')?.value||'';
  const monsters = window.MONSTERS||[];
  const q=MQ.query.toLowerCase().trim();
  const filtered=monsters.filter(m=>{
    if(q&&!m.name.toLowerCase().includes(q)&&!(m.type||'').toLowerCase().includes(q))return false;
    if(MQ.filterCR&&m.cr!==MQ.filterCR)return false;
    if(MQ.filterType&&m.type!==MQ.filterType)return false;
    if(MQ.filterSize&&m.size!==MQ.filterSize)return false;
    return true;
  }).slice(0,300);
  const countEl=document.getElementById('mq-count');
  const clearEl=document.getElementById('mq-clear');
  if(countEl) countEl.textContent=`${filtered.length}${filtered.length===300?'+':''} resultaten`;
  if(clearEl) clearEl.textContent=(q||MQ.filterCR||MQ.filterType||MQ.filterSize)?'✕ wis':'';
  const list=document.getElementById('mq-list');
  if(!list) return;
  list.innerHTML=filtered.map(m=>{
    const sel=MQ.selectedName===m.name&&MQ.selectedSource===(m.source||'');
    return `<div class="mq-item${sel?' selected':''}" onclick="mqSelect(${JSON.stringify(m.name)},${JSON.stringify(m.source||'')})">
      <span class="cr-badge">${esc(m.cr)}</span>
      <div style="flex:1;min-width:0">
        <div class="cinzel" style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.name)}</div>
        <div style="font-size:10px;color:var(--dim);font-style:italic">${esc(m.size)} ${esc(m.type)}</div>
      </div>
    </div>`;
  }).join('');
}

function mqClearFilters() {
  MQ.query='';MQ.filterCR='';MQ.filterType='';MQ.filterSize='';
  const s=document.getElementById('mq-search'); if(s)s.value='';
  const cr=document.getElementById('mq-cr'); if(cr)cr.value='';
  const ty=document.getElementById('mq-type'); if(ty)ty.value='';
  const si=document.getElementById('mq-size'); if(si)si.value='';
  mqFilter();
}

    </div>
    <button class="green" onclick="mqAddToTracker(${JSON.stringify(m.name)},${JSON.stringify(m.source||'')})" style="margin-bottom:13px;display:flex;align-items:center;gap:7px">⚔️ Voeg toe aan Initiative Tracker</button>
    ${m.desc?`<div style="font-size:13px;color:#8a7a5a;font-style:italic;line-height:1.5;margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--border)">${esc(m.desc)}</div>`:''}
    <div class="section-label">Defensie</div>
    <div class="stat-row">${SB('AC',m.ac)}${SB('Touch',m.touch)}${SB('Flat-F',m.ff)}${SB('HP',m.hp)}</div>

    ${m.immunities?`<div style="font-size:13px;margin-bottom:5px"><span style="color:var(--muted)">Immuniteiten: </span>${esc(m.immunities)}</div>`:''}
    ${m.resistances?`<div style="font-size:13px;margin-bottom:5px"><span style="color:var(--muted)">Resistanties: </span>${esc(m.resistances)}</div>`:''}
    <div class="divider"></div>
    <div class="section-label">Aanvallen</div>
    ${m.speed?`<div style="font-size:13px;margin-bottom:6px"><span style="color:var(--muted)">Snelheid: </span>${esc(m.speed)}</div>`:''}
    ${m.attacks?`<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:12px;font-family:monospace;color:var(--text);line-height:1.7;margin-bottom:7px">${m.attacks.split('; ').map(a=>`<div>${esc(a)}</div>`).join('')}</div>`:''}
    <div class="divider"></div>

    ${[['Zintuigen',m.senses],['Talen',m.languages],['Feats',m.feats],['Skills',m.skills],['Bijzondere kwaliteiten',m.sq]].filter(([,v])=>v).map(([l,v])=>`<div style="font-size:13px;margin-bottom:5px"><span style="color:var(--muted)">${l}: </span>${esc(v)}</div>`).join('')}

function mqAddToTracker(name, source) {
  const m=(window.MONSTERS||[]).find(x=>x.name===name&&(x.source||'')===(source||''));
  if(!m) return;
  const c={id:uid(),name:m.name,type:'Enemy',initBonus:m.init||0,initiative:0,hpMax:m.hp||0,hpCurrent:m.hp||0,ac:m.ac||10,conScore:m.con||10,conditions:[]};
  IT.combatants.push(c);
  itSave();
  navigateTo('initiative');
  toast(`${m.name} toegevoegd aan tracker`);
}

let EB = { sessions:[], parties:[], activeSessId:null, activeEncId:null, activePartyId:null, rightTab:'party' };

function ebLoad() {
  const d=load('pf1e-encounters');
  if(d){EB.sessions=d.sessions||[];EB.parties=d.parties||[];EB.activeSessId=d.activeSessId||null;EB.activeEncId=d.activeEncId||null;EB.activePartyId=d.activePartyId||null;}
}
function ebSave() { save('pf1e-encounters',{sessions:EB.sessions,parties:EB.parties,activeSessId:EB.activeSessId,activeEncId:EB.activeEncId,activePartyId:EB.activePartyId}); }
function ebSess() { return EB.sessions.find(s=>s.id===EB.activeSessId)||null; }
function ebEnc()  { const s=ebSess(); return s?(s.encounters||[]).find(e=>e.id===EB.activeEncId)||null:null; }
function ebParty(){ return EB.parties.find(p=>p.id===EB.activePartyId)||null; }

function renderEncounterBuilder(el) {
  ebLoad();
  el.innerHTML=`<div id="eb-wrap">
    <div id="eb-toolbar">

function ebRefresh() {
  if(!document.getElementById('eb-wrap')) return;
  const sess=ebSess(), enc=ebEnc(), party=ebParty();
  // Update newenc btn
  const neb=document.getElementById('eb-newenc-btn');
  if(neb) neb.disabled=!EB.activeSessId;
  // Session list
  const sl=document.getElementById('eb-sess-list');
  if(sl) sl.innerHTML=EB.sessions.length?EB.sessions.map(s=>`
    <div class="eb-card${s.id===EB.activeSessId?' selected':''}" onclick="ebSelectSess('${s.id}')">
      <div class="eb-card-title">${esc(s.name)}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:2px">${s.campaign?esc(s.campaign)+' · ':''} ${esc(s.date||'—')} · ${(s.encounters||[]).length} enc.</div>
      <button class="red" style="font-size:9px;padding:1px 5px;margin-top:4px" onclick="event.stopPropagation();ebDelSess('${s.id}')">✕</button>
    </div>`).join(''):'<div style="padding:20px 10px;text-align:center;color:var(--dim);font-size:12px">Maak een sessie aan</div>';
  // Enc list
  const eh=document.getElementById('eb-enc-header');
  if(eh) eh.textContent=sess?esc(sess.name):'Encounters';
  const el2=document.getElementById('eb-enc-list');
  if(el2) {
    if(!sess) { el2.innerHTML='<div style="padding:20px 10px;text-align:center;color:var(--dim);font-size:12px">Selecteer een sessie</div>'; }
    else {
      const encs=sess.encounters||[];
      const SCOL={Voorbereid:'#4a9eff',Actief:'#f39c12',Voltooid:'#2ecc71',Overgeslagen:'#5a5a5a'};
      el2.innerHTML=encs.length?encs.map(e=>{
        const ax=adjXP(e.monsters||[]);
        const df=getDiff(ax,party);
        const sc=SCOL[e.status]||'#888';
        return `<div class="eb-card${e.id===EB.activeEncId?' selected':''}" onclick="ebSelectEnc('${e.id}')">
          <div class="eb-card-title">${esc(e.name)}</div>
          <div style="display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap">
            <span class="diff-badge" style="background:${sc}18;border:1px solid ${sc}55;color:${sc}">${esc(e.status)}</span>
            ${df?`<span class="diff-badge" style="background:${df.color}18;border:1px solid ${df.color}55;color:${df.color}">${esc(df.label)}</span>`:''}
            ${(e.monsters||[]).length?`<span style="font-size:10px;color:var(--dim)">${fmtXP(ax)} XP</span>`:''}
          </div>
          <div style="display:flex;gap:3px;margin-top:4px">
            <button style="font-size:9px;padding:1px 5px" onclick="event.stopPropagation();ebDupEnc('${e.id}')">⎘</button>
            <button class="red" style="font-size:9px;padding:1px 5px" onclick="event.stopPropagation();ebDelEnc('${e.id}')">✕</button>
          </div>
        </div>`;
      }).join(''):'<div style="padding:20px 10px;text-align:center;color:var(--dim);font-size:12px">Maak een encounter aan</div>';
    }
  }
  // Detail
  ebRenderDetail();
  // Right panel
  ebRenderRight();
}

function ebRenderDetail() {
  const detail=document.getElementById('eb-detail'); if(!detail) return;
  const enc=ebEnc(), party=ebParty();
  if(!enc) { detail.innerHTML='<div class="empty-state"><div class="empty-icon">⚔️</div><div class="empty-title">Selecteer een encounter</div></div>'; return; }
  const SCOL={Voorbereid:'#4a9eff',Actief:'#f39c12',Voltooid:'#2ecc71',Overgeslagen:'#5a5a5a'};
  const raw=calcRawXP(enc.monsters||[]), ax=adjXP(enc.monsters||[]), df=getDiff(ax,party), thresh=getThresholds(party);
  const barMax=thresh?thresh[3]*1.2:Math.max(ax*2,1);
  detail.innerHTML=`
    <div style="padding:9px 13px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,#1a1208,#111310);display:flex;align-items:center;gap:8px;flex-shrink:0">
      <input class="cinzel" style="flex:1;font-size:14px;color:var(--gold);background:transparent;border:none;padding:2px 0" value="${esc(enc.name)}" onchange="ebUpdEnc('name',this.value)" placeholder="Encounter naam...">
      <select style="width:auto;font-size:11px" onchange="ebUpdEnc('status',this.value)">
        ${['Voorbereid','Actief','Voltooid','Overgeslagen'].map(s=>`<option${enc.status===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <button class="green" style="font-size:11px" onclick="ebSendToTracker()">▶ Naar Tracker</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:13px 14px">
      ${party?`<div style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:11px 13px;margin-bottom:13px">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">
          <div style="flex:1"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:2px">Moeilijkheid</div>
            <div style="display:flex;align-items:baseline;gap:7px"><span class="cinzel" style="font-size:20px;color:${df?df.color:'var(--dim)'}">${df?df.label:'—'}</span>
            ${df?`<span style="font-size:12px;color:var(--muted)">voor ${party.members.length}p (gem. lvl ${avgLevel(party)})</span>`:''}</div></div>
          <div style="text-align:right"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Gecorrigeerde XP</div>
            <div class="cinzel" style="font-size:18px;color:var(--gold)">${fmtXP(ax)}</div>
            <div style="font-size:10px;color:var(--dim)">Basis: ${fmtXP(raw)} × ${raw>0?(ax/raw).toFixed(1):'—'}</div></div>
        </div>
        <div class="xp-bar-wrap">${thresh?thresh.map((t,i)=>`<div class="xp-thresh-mark" style="left:${Math.min(100,(t/barMax)*100)}%;background:${DIFF_COLORS[i]}88"></div>`).join(''):''}
          <div class="xp-bar-fill" style="width:${Math.min(100,(ax/barMax)*100)}%;background:${df?df.color:'#3a3a3a'}"></div></div>
        ${thresh?`<div style="display:flex;gap:10px;flex-wrap:wrap">${DIFF_LABELS.map((l,i)=>`<div style="font-size:10px;color:${DIFF_COLORS[i]}">${l}: ${fmtXP(thresh[i])}</div>`).join('')}</div>`:''}
      </div>`:''}
      <div class="section-label">Monsters</div>
      <div id="eb-monster-list">${(enc.monsters||[]).length?'':`<div style="text-align:center;padding:14px;color:var(--dim);font-size:12px;border:1px dashed var(--border);border-radius:5px;margin-bottom:7px">Voeg monsters toe via de zoekbalk</div>`}</div>
      <div class="autocomplete-wrap" style="margin-bottom:6px">
        <input id="eb-monster-search" style="width:100%;box-sizing:border-box" placeholder="Zoek monster om toe te voegen..." oninput="ebMonsterSearch()" onblur="setTimeout(()=>ebHideAuto(),200)">
        <div id="eb-auto" class="autocomplete-list hidden"></div>
      </div>
      <div id="eb-manual-area">
        <button style="width:100%;font-size:11px;margin-bottom:10px" onclick="ebShowManual()">+ Handmatig toevoegen</button>
      </div>
      <div class="divider"></div>
      <div class="mb8"><label>GM Notities</label><textarea style="min-height:65px" onchange="ebUpdEnc('notes',this.value)" placeholder="Locatie, triggers, tactiek...">${esc(enc.notes||'')}</textarea></div>
      <div><label>Loot / Rewards</label><textarea style="min-height:42px" onchange="ebUpdEnc('loot',this.value)" placeholder="Gold, items, XP...">${esc(enc.loot||'')}</textarea></div>
    </div>`;
  ebRenderMonsterList();
}

function ebRenderMonsterList() {
  const enc=ebEnc(); if(!enc) return;
  const el=document.getElementById('eb-monster-list'); if(!el) return;
  const monsters=enc.monsters||[];
  if(!monsters.length){el.innerHTML='<div style="text-align:center;padding:14px;color:var(--dim);font-size:12px;border:1px dashed var(--border);border-radius:5px;margin-bottom:7px">Voeg monsters toe via de zoekbalk</div>';return;}
  el.innerHTML=monsters.map(m=>`<div class="monster-row">
    <span class="cr-badge">${esc(m.cr)}</span>
    <div style="flex:1;min-width:0">
      <div class="cinzel" style="font-size:12px">${esc(m.name)}</div>
      <div style="font-size:10px;color:var(--dim)">${fmtXP(CR_XP[m.cr]||0)} XP elk · AC ${m.ac||'?'} · HP ${m.hp||'?'}</div>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <button style="padding:2px 7px;font-size:13px" onclick="ebChangeCount('${m.id}',-1)">−</button>
      <span class="cinzel" style="font-size:13px;min-width:18px;text-align:center">${m.count||1}</span>
      <button style="padding:2px 7px;font-size:13px" onclick="ebChangeCount('${m.id}',1)">+</button>
    </div>
    <div style="font-size:11px;color:var(--muted);min-width:38px;text-align:right">${fmtXP((CR_XP[m.cr]||0)*(m.count||1))}</div>
    <button class="red" style="padding:2px 6px;font-size:11px" onclick="ebRemoveMonster('${m.id}')">✕</button>
  </div>`).join('');
}

function ebMonsterSearch() {
  const q=document.getElementById('eb-monster-search')?.value||'';
  const auto=document.getElementById('eb-auto'); if(!auto) return;
  if(q.length<2){auto.classList.add('hidden');return;}
  const results=(window.MONSTERS||[]).filter(m=>m.name.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(!results.length){auto.classList.add('hidden');return;}
  auto.innerHTML=results.map(m=>`<div class="autocomplete-item" onmousedown="ebAddMonster(${JSON.stringify(m.name)},${JSON.stringify(m.source||'')})">
    <span class="cr-badge">${esc(m.cr)}</span>
    <div><div class="cinzel" style="font-size:12px">${esc(m.name)}</div><div style="font-size:10px;color:var(--dim);font-style:italic">${esc(m.size)} ${esc(m.type)}</div></div>
  </div>`).join('');
  auto.classList.remove('hidden');
}
function ebHideAuto(){const a=document.getElementById('eb-auto');if(a)a.classList.add('hidden');}
function ebAddMonster(name, source) {
  const m=(window.MONSTERS||[]).find(x=>x.name===name&&(x.source||'')===(source||''));
  if(!m) return;
  const sess=ebSess(); if(!sess) return;
  const enc=sess.encounters.find(e=>e.id===EB.activeEncId); if(!enc) return;
  const existing=(enc.monsters||[]).findIndex(x=>x.name===m.name&&x.cr===m.cr);
  if(existing>=0) {
    enc.monsters = enc.monsters.map((x,i)=>i===existing?{...x,count:(x.count||1)+1}:x);
  } else {
    enc.monsters = [...(enc.monsters||[]),{id:uid(),name:m.name,cr:m.cr,count:1,hp:m.hp||0,ac:m.ac||0,init:m.init||0,con:m.con||10}];
  }
  const si=document.getElementById('eb-monster-search');if(si)si.value='';
  ebHideAuto();
  ebSave();
  ebRenderMonsterList();
  ebRenderDetail();
}
function ebShowManual() {
  const area=document.getElementById('eb-manual-area'); if(!area) return;
  area.innerHTML=`<div style="display:flex;gap:5px;margin-bottom:9px;align-items:center">
    <input id="eb-man-name" style="flex:1;box-sizing:border-box" placeholder="Naam...">
    <select id="eb-man-cr" style="width:70px">${CR_LIST.map(c=>`<option value="${c}">CR ${c}</option>`).join('')}</select>
    <button class="gold" onclick="ebManualAdd()">+</button>
    <button onclick="ebHideManual()">✕</button>
  </div>`;
  document.getElementById('eb-man-name')?.focus();
}
function ebHideManual(){const a=document.getElementById('eb-manual-area');if(a)a.innerHTML='<button style="width:100%;font-size:11px;margin-bottom:10px" onclick="ebShowManual()">+ Handmatig toevoegen</button>';}
function ebManualAdd() {
  const name=document.getElementById('eb-man-name')?.value.trim(); if(!name) return;
  const cr=document.getElementById('eb-man-cr')?.value||'1';
  const sess=ebSess(); if(!sess) return;
  const enc=sess.encounters.find(e=>e.id===EB.activeEncId); if(!enc) return;
  enc.monsters=[...(enc.monsters||[]),{id:uid(),name,cr,count:1,hp:0,ac:0,init:0,con:10}];
  ebSave();ebRenderMonsterList();ebRenderDetail();
}
function ebChangeCount(mid, delta) {
  const sess=ebSess(); if(!sess) return;
  const enc=sess.encounters.find(e=>e.id===EB.activeEncId); if(!enc) return;
  enc.monsters=(enc.monsters||[]).map(m=>m.id===mid?{...m,count:Math.max(1,(m.count||1)+delta)}:m);
  ebSave();ebRenderMonsterList();
}
function ebRemoveMonster(mid){
  const sess=ebSess(); if(!sess) return;
  const enc=sess.encounters.find(e=>e.id===EB.activeEncId); if(!enc) return;
  enc.monsters=(enc.monsters||[]).filter(m=>m.id!==mid);
  ebSave();ebRenderMonsterList();ebRenderDetail();
}
function ebUpdEnc(field, val) {
  const enc=ebEnc(); if(!enc) return;
  enc[field]=val;
  const sess=ebSess(); if(sess) sess.encounters=(sess.encounters||[]).map(e=>e.id===enc.id?enc:e);
  ebSave(); if(field!=='notes'&&field!=='loot') ebRefresh();
}
function ebSendToTracker() {
  const enc=ebEnc(), party=ebParty(); if(!enc) return;
  const coms=(enc.monsters||[]).flatMap(m=>Array.from({length:m.count||1},(_,i)=>({id:uid(),name:(m.count||1)>1?`${m.name} ${i+1}`:m.name,type:'Enemy',initBonus:m.init||0,initiative:0,hpMax:m.hp||0,hpCurrent:m.hp||0,ac:m.ac||10,conScore:m.con||10,conditions:[]})));
  if(party) party.members.forEach(m=>coms.push({id:uid(),name:m.name||m.cls,type:'PC',initBonus:0,initiative:0,hpMax:0,hpCurrent:0,ac:10,conScore:10,conditions:[]}));
  IT.combatants=[...IT.combatants,...coms]; itSave();
  navigateTo('initiative');
  toast(`${coms.length} deelnemers toegevoegd aan tracker`);
}

function ebRenderRight() {
  const body=document.getElementById('eb-right-body'); if(!body) return;
  document.getElementById('eb-tab-party')?.classList.toggle('active',EB.rightTab==='party');
  document.getElementById('eb-tab-session')?.classList.toggle('active',EB.rightTab==='session');
  if(EB.rightTab==='party') ebRenderParty(body);
  else ebRenderSession(body);
}

function ebRenderParty(body) {
  const party=ebParty();
  body.innerHTML=`<div style="display:flex;gap:5px;margin-bottom:8px">
    <select style="flex:1" onchange="EB.activePartyId=this.value;ebSave();ebRefresh()">
      <option value="">— Selecteer party —</option>
      ${EB.parties.map(p=>`<option value="${p.id}"${p.id===EB.activePartyId?' selected':''}>${esc(p.name)}</option>`).join('')}
    </select>

function ebRenderMembers(party) {
  return (party.members||[]).map(m=>`<div style="display:grid;grid-template-columns:1fr 34px 1fr auto;gap:4px;margin-bottom:5px;align-items:center">

function ebUpdMember(mid,field,val){const p=ebParty();if(!p)return;const m=p.members.find(x=>x.id===mid);if(m){m[field]=val;ebSave();if(field!=='name')ebRefresh();}}
function ebAddMember(){const p=ebParty();if(!p)return;p.members=[...(p.members||[]),{id:uid(),name:'',level:1,cls:'Fighter'}];ebSave();ebRenderRight();}
function ebRemMember(mid){const p=ebParty();if(!p)return;p.members=p.members.filter(x=>x.id!==mid);ebSave();ebRefresh();}

function ebRenderSession(body) {
  const sess=ebSess();
  if(!sess){body.innerHTML='<div style="color:var(--dim);font-size:12px;text-align:center;margin-top:16px">Selecteer een sessie</div>';return;}
  const SCOL={Voorbereid:'#4a9eff',Actief:'#f39c12',Voltooid:'#2ecc71',Overgeslagen:'#5a5a5a'};
  const party=ebParty();
  const sessXP=(sess.encounters||[]).reduce((s,e)=>s+adjXP(e.monsters||[]),0);
  body.innerHTML=`<div class="mb8"><label>Campaign</label><input style="width:100%;box-sizing:border-box" value="${esc(sess.campaign||'')}" onchange="ebUpdSess('campaign',this.value)" placeholder="Curse of the Crimson Throne, Rise of the Runelords..."></div>
  <div class="mb8"><label>Sessie naam</label><input style="width:100%;box-sizing:border-box" value="${esc(sess.name)}" onchange="ebUpdSess('name',this.value)"></div>
  <div class="mb8"><label>Datum</label><input type="date" style="width:100%;box-sizing:border-box" value="${esc(sess.date||'')}" onchange="ebUpdSess('date',this.value)"></div>
  <div class="mb8"><label>Sessie notities</label><textarea style="min-height:75px" onchange="ebUpdSess('notes',this.value)" placeholder="Verhaallijnen, hooks, recap...">${esc(sess.notes||'')}</textarea></div>
  <div style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-size:12px">

    ${(sess.encounters||[]).map(e=>{const ax=adjXP(e.monsters||[]);const df=getDiff(ax,party);const sc=SCOL[e.status]||'#888';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:${sc};display:inline-block"></span><span style="font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.name)}</span></div>
        <div style="display:flex;gap:5px;align-items:center">${df?`<span style="font-size:9px;color:${df.color}">${df.label}</span>`:''}<span style="font-size:11px;color:var(--muted)">${fmtXP(ax)}</span></div>

    <div style="display:flex;justify-content:space-between;margin-top:7px;font-family:Cinzel,serif;font-size:12px"><span style="color:var(--muted)">Totaal XP</span><span style="color:var(--gold)">${fmtXP(sessXP)}</span></div>

  </div>`;
}

function ebUpdSess(field,val){const s=ebSess();if(s){s[field]=val;ebSave();}}
function ebSetRightTab(t){EB.rightTab=t;ebRenderRight();}
function ebNewSess(){const s={id:uid(),campaign:'',name:`Sessie ${EB.sessions.length+1}`,date:new Date().toISOString().slice(0,10),notes:'',encounters:[]};EB.sessions.unshift(s);EB.activeSessId=s.id;EB.activeEncId=null;ebSave();ebRefresh();}
function ebDelSess(id){if(!confirm('Sessie verwijderen?'))return;EB.sessions=EB.sessions.filter(s=>s.id!==id);if(EB.activeSessId===id){EB.activeSessId=null;EB.activeEncId=null;}ebSave();ebRefresh();}
function ebSelectSess(id){EB.activeSessId=id;EB.activeEncId=null;ebSave();ebRefresh();}
function ebNewEnc(){if(!EB.activeSessId)return;const s=ebSess();if(!s)return;const e={id:uid(),name:`Encounter ${(s.encounters||[]).length+1}`,status:'Voorbereid',monsters:[],notes:'',loot:''};s.encounters=[...(s.encounters||[]),e];EB.activeEncId=e.id;ebSave();ebRefresh();}
function ebDelEnc(id){const s=ebSess();if(!s)return;s.encounters=(s.encounters||[]).filter(e=>e.id!==id);if(EB.activeEncId===id)EB.activeEncId=null;ebSave();ebRefresh();}
function ebDupEnc(id){const s=ebSess();if(!s)return;const e=s.encounters.find(x=>x.id===id);if(!e)return;const c={...e,monsters:(e.monsters||[]).map(m=>({...m,id:uid()})),id:uid(),name:e.name+' (kopie)',status:'Voorbereid'};s.encounters=[...s.encounters,c];EB.activeEncId=c.id;ebSave();ebRefresh();toast('Encounter gedupliceerd');}
function ebSelectEnc(id){EB.activeEncId=id;ebSave();ebRefresh();}
function ebNewParty(){const p={id:uid(),name:`Party ${EB.parties.length+1}`,members:[]};EB.parties.push(p);EB.activePartyId=p.id;ebSave();ebRefresh();}
function ebDelParty(){if(!confirm('Party verwijderen?'))return;EB.parties=EB.parties.filter(p=>p.id!==EB.activePartyId);EB.activePartyId=null;ebSave();ebRefresh();}
function ebExport(){const blob=new Blob([JSON.stringify({sessions:EB.sessions,parties:EB.parties},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='pf1e-encounters.json';a.click();URL.revokeObjectURL(url);}
function ebImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.sessions)EB.sessions=[...EB.sessions,...d.sessions];if(d.parties)EB.parties=[...EB.parties,...d.parties];ebSave();ebRefresh();toast('Data geïmporteerd ✓');}catch{toast('Fout bij importeren','#e74c3c');}};r.readAsText(f);e.target.value='';}

          <option value="location"${NPC.sortBy==='location'?' selected':''}>Locatie</option>
        </select>
      </div>
      <div id="npc-list"></div>
      <div style="padding:7px 9px;border-top:1px solid var(--border);display:flex;gap:5px">
        <button class="gold" style="flex:1;font-size:11px" onclick="npcNew()">+ Nieuwe NPC</button>
        <button style="padding:7px 9px;font-size:10px" onclick="npcExport()">⬇</button>
        <label style="padding:7px 9px;font-size:10px;cursor:pointer;border:1px solid var(--border);border-radius:5px;color:var(--muted)">⬆<input type="file" accept=".json" style="display:none" onchange="npcImport(event)"></label>
      </div>
    </div>
    <div id="npc-detail"><div class="empty-state"><div class="empty-icon">🎭</div><div class="empty-title">Selecteer een NPC</div><div class="empty-sub">Of maak een nieuwe aan</div><button class="gold" style="margin-top:14px" onclick="npcNew()">+ Eerste NPC aanmaken</button></div></div>
  </div>`;
  npcFilter();
}

function npcFilter() {
  const q=NPC.search=(document.getElementById('npc-search')?.value||'').toLowerCase();
  NPC.filterRel=NPC.filterRel||''; NPC.filterStat=NPC.filterStat||''; NPC.filterLoc=NPC.filterLoc||'';
  let filtered=NPC.npcs.filter(n=>{
    if(q&&!n.name.toLowerCase().includes(q)&&!(n.role||'').toLowerCase().includes(q)&&!(n.location||'').toLowerCase().includes(q)&&!(n.tags||[]).some(t=>t.includes(q)))return false;
    if(NPC.filterRel&&n.relation!==NPC.filterRel)return false;
    if(NPC.filterStat&&n.status!==NPC.filterStat)return false;
    if(NPC.filterLoc&&n.location!==NPC.filterLoc)return false;
    return true;
  }).sort((a,b)=>{
    if(NPC.sortBy==='name')return(a.name||'').localeCompare(b.name||'');
    if(NPC.sortBy==='status')return a.status.localeCompare(b.status);
    if(NPC.sortBy==='location')return(a.location||'').localeCompare(b.location||'');
    return b.createdAt-a.createdAt;
  });
  const countEl=document.getElementById('npc-count');
  if(countEl) countEl.textContent=`${filtered.length} NPC's`;
  const list=document.getElementById('npc-list'); if(!list) return;
  if(!filtered.length){list.innerHTML=`<div style="padding:28px 13px;text-align:center;color:var(--dim);font-size:12px">${NPC.npcs.length?'Geen resultaten':'Geen NPC\u2019s — maak er een aan'}</div>`;return;}
  function renderCard(n){
    const sc=NPC_STAT_C[n.status]||'#888', rc=NPC_REL_C[n.relation]||'#888';
    const dead=n.status==='Dood';
    return `<div class="npc-item${NPC.selectedId===n.id?' selected':''}" onclick="npcSelect('${n.id}')">
      <div style="display:flex;align-items:flex-start;gap:6px">
        <div class="status-dot" style="background:${sc}"></div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span class="cinzel" style="font-size:12px;${dead?'text-decoration:line-through;':''}overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:125px">${esc(n.name)||'<em style="color:var(--dim)">Naamloos</em>'}</span>
            <span class="rel-badge" style="background:${rc}18;border:1px solid ${rc}55;color:${rc}">${esc(n.relation)}</span>
          </div>
          <div style="font-size:10px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${[n.race,n.role].filter(Boolean).map(esc).join(' · ')}${n.location?` <span style="color:#4a3a28">@ ${esc(n.location)}</span>`:''}</div>
          ${(n.tags||[]).length?`<div style="margin-top:3px">${(n.tags||[]).slice(0,3).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}${(n.tags||[]).length>3?`<span style="font-size:9px;color:var(--dim)">+${n.tags.length-3}</span>`:''}</div>`:''}
        </div>
        <button onclick="event.stopPropagation();npcDel('${n.id}')" style="background:transparent;border:none;color:#4a2020;font-size:13px;padding:0 2px;flex-shrink:0;cursor:pointer">✕</button>
      </div>
    </div>`;
  }
  if(NPC.viewMode==='list') { list.innerHTML=filtered.map(renderCard).join(''); }
  else {
    const byLoc={};
    filtered.forEach(n=>{const l=n.location||'— Onbekend —';if(!byLoc[l])byLoc[l]=[];byLoc[l].push(n);});
    list.innerHTML=Object.entries(byLoc).map(([loc,ns])=>`
      <div style="padding:5px 11px;background:var(--bg);border-bottom:1px solid var(--border);border-top:1px solid var(--border);font-size:10px;color:var(--gold);font-family:Cinzel,serif;text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:6px">📍${esc(loc)}<span style="color:var(--dim);margin-left:auto">${ns.length}</span></div>
      ${ns.map(renderCard).join('')}`).join('');
  }
}

function npcNew(){const n={id:uid(),name:'',race:'',role:'',location:'',status:'Levend',relation:'Onbekend',tags:[],gmNotes:'',partyKnows:'',cr:'',createdAt:Date.now()};NPC.npcs.unshift(n);NPC.selectedId=n.id;npcSave();npcFilter();npcRenderDetail();}
function npcSelect(id){NPC.selectedId=id;npcFilter();npcRenderDetail();}
function npcDel(id){NPC.npcs=NPC.npcs.filter(n=>n.id!==id);if(NPC.selectedId===id)NPC.selectedId=null;npcSave();npcFilter();npcRenderDetail();}
function npcDup(id){const src=NPC.npcs.find(n=>n.id===id);if(!src)return;const c={...src,id:uid(),name:src.name+' (kopie)',createdAt:Date.now(),tags:[...(src.tags||[])]};NPC.npcs.unshift(c);NPC.selectedId=c.id;npcSave();npcFilter();npcRenderDetail();}
function npcUpd(field,val){const n=npcSel();if(!n)return;n[field]=val;npcSave();if(['status','relation'].includes(field)){npcFilter();npcRenderDetail();}}
function npcToggleTag(t){const n=npcSel();if(!n)return;n.tags=n.tags.includes(t)?n.tags.filter(x=>x!==t):[...n.tags,t];npcSave();npcRenderDetail();}
function npcAddTag(){const inp=document.getElementById('npc-tag-inp');if(!inp)return;const t=inp.value.trim().toLowerCase();if(!t)return;const n=npcSel();if(!n||n.tags.includes(t))return;n.tags.push(t);inp.value='';npcSave();npcRenderDetail();}
function npcExport(){const blob=new Blob([JSON.stringify(NPC.npcs,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='pf1e-npcs.json';a.click();URL.revokeObjectURL(url);}
function npcImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){NPC.npcs=[...NPC.npcs,...d];npcSave();npcFilter();toast('NPCs geïmporteerd ✓');}}catch{toast('Fout bij importeren','#e74c3c');}};r.readAsText(f);e.target.value='';}

function npcRenderDetail(){
  const detail=document.getElementById('npc-detail'); if(!detail) return;
  const n=npcSel();
  if(!n){detail.innerHTML='<div class="empty-state"><div class="empty-icon">🎭</div><div class="empty-title">Selecteer een NPC</div><div class="empty-sub">Of maak een nieuwe aan</div><button class="gold" style="margin-top:14px" onclick="npcNew()">+ Eerste NPC aanmaken</button></div>';return;}
  const sc=NPC_STAT_C[n.status]||'#888', rc=NPC_REL_C[n.relation]||'#888';
  detail.innerHTML=`
    <div style="padding:11px 14px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,#1a1208,#111310);flex-shrink:0;display:flex;align-items:center;gap:9px">
      <input class="cinzel" style="flex:1;font-size:16px;color:var(--gold);background:transparent;border:none;padding:2px 0" value="${esc(n.name)}" onchange="npcUpd('name',this.value)" placeholder="NPC naam...">
      <select style="width:auto;font-size:11px;color:${sc};border-color:${sc}44" onchange="npcUpd('status',this.value)">
        ${NPC_STATUSES.map(s=>`<option${n.status===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <select style="width:auto;font-size:11px;color:${rc};border-color:${rc}44" onchange="npcUpd('relation',this.value)">
        ${NPC_RELS.map(r=>`<option${n.relation===r?' selected':''}>${r}</option>`).join('')}
      </select>
    </div>
    <div class="npc-detail-body">
      <div class="grid2">
        <div><label>Ras / Type</label><input style="width:100%;box-sizing:border-box" value="${esc(n.race||'')}" onchange="npcUpd('race',this.value)" placeholder="Menselijk, Elf..."></div>
        <div><label>Rol / Functie</label><input style="width:100%;box-sizing:border-box" value="${esc(n.role||'')}" onchange="npcUpd('role',this.value)" placeholder="Guard, Herbergier..."></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 80px;gap:8px;margin-bottom:9px">
        <div><label>Locatie</label><input style="width:100%;box-sizing:border-box" value="${esc(n.location||'')}" onchange="npcUpd('location',this.value)" placeholder="Tavern, Dungeon..."></div>
        <div><label>CR</label><input style="width:100%;box-sizing:border-box" value="${esc(n.cr||'')}" onchange="npcUpd('cr',this.value)" placeholder="1/2, 3..."></div>
      </div>
      <div class="mb8">
        <label>Tags</label>
        <div style="display:flex;flex-wrap:wrap;margin-bottom:4px">${(n.tags||[]).map(t=>`<span class="tag-pill" onclick="npcToggleTag('${esc(t)}')">${esc(t)} <span style="opacity:.6;font-size:11px">×</span></span>`).join('')}</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px">${NPC_TAGS_PRE.filter(t=>!(n.tags||[]).includes(t)).map(t=>`<span onclick="npcToggleTag('${t}')" style="font-size:10px;padding:1px 6px;border-radius:10px;cursor:pointer;background:var(--bg);border:1px solid var(--border);color:var(--dim)">+ ${t}</span>`).join('')}</div>
        <div style="display:flex;gap:5px"><input id="npc-tag-inp" style="flex:1;box-sizing:border-box;font-size:12px" placeholder="Eigen tag..." onkeydown="if(event.key==='Enter')npcAddTag()"><button onclick="npcAddTag()" style="padding:6px 11px;font-size:12px">+</button></div>
      </div>
      <div class="divider"></div>
      <div class="mb8"><label>🔒 GM Notities</label><textarea style="min-height:75px" onchange="npcUpd('gmNotes',this.value)" placeholder="Geheimen, motivaties, stats, plannen...">${esc(n.gmNotes||'')}</textarea></div>
      <div><label>👥 Wat de party weet</label><textarea style="min-height:55px" onchange="npcUpd('partyKnows',this.value)" placeholder="Naam, verschijning, bekende info...">${esc(n.partyKnows||'')}</textarea></div>
    </div>
    <div class="status-bar">
      ${NPC_STATUSES.map(s=>`<button class="status-quick-btn" style="background:${n.status===s?NPC_STAT_C[s]+'22':'transparent'};border:1px solid ${n.status===s?NPC_STAT_C[s]+'66':'var(--border)'};color:${n.status===s?NPC_STAT_C[s]:'var(--dim)'}" onclick="npcUpd('status','${s}')">${s}</button>`).join('')}
      <button style="margin-left:auto;padding:4px 9px;font-size:10px" onclick="npcDup('${n.id}')">⎘ Dup.</button>

}

// MODULE 5: SESSION NOTES
// ══════════════════════════════════════════════════════════════════════════════
let SN = {
  sessions: [],
  activeId: null,
  activeTab: 'notes'   // 'notes' | 'quests' | 'todo'
};

function snLoad() {
  const d = load('pf1e-session-notes');
  if(d) { SN.sessions = d.sessions||[]; SN.activeId = d.activeId||null; }
}
function snSave() { save('pf1e-session-notes', {sessions: SN.sessions, activeId: SN.activeId}); }
function snSel()  { return SN.sessions.find(s => s.id === SN.activeId) || null; }

function snNew() {
  const s = {
    id: uid(),
    title: 'Sessie ' + (SN.sessions.length + 1),
    date: new Date().toISOString().slice(0,10),
    notes: '',
    quests: [],
    todo: []
  };
  SN.sessions.unshift(s);
  SN.activeId = s.id;
  snSave();
  snRender();
}

function snDel(id) {
  if(!confirm('Sessie notities verwijderen?')) return;
  SN.sessions = SN.sessions.filter(s => s.id !== id);
  if(SN.activeId === id) SN.activeId = SN.sessions[0]?.id || null;
  snSave();
  snRender();
}

function snUpd(field, val) {
  const s = snSel(); if(!s) return;
  s[field] = val;
  snSave();
}

// Quests
function snAddQuest() {
  const s = snSel(); if(!s) return;
  s.quests = [...(s.quests||[]), {id: uid(), text: '', done: false, priority: 'open'}];
  snSave();
  snRenderDetail();
}
function snUpdQuest(qid, field, val) {
  const s = snSel(); if(!s) return;
  s.quests = s.quests.map(q => q.id === qid ? {...q, [field]: val} : q);
  snSave();
  if(field === 'done') snRenderDetail();
}
function snDelQuest(qid) {
  const s = snSel(); if(!s) return;
  s.quests = s.quests.filter(q => q.id !== qid);
  snSave();
  snRenderDetail();
}

// Todo
function snAddTodo() {
  const s = snSel(); if(!s) return;
  s.todo = [...(s.todo||[]), {id: uid(), text: '', done: false, priority: 'normal'}];
  snSave();
  snRenderDetail();
}
function snUpdTodo(tid, field, val) {
  const s = snSel(); if(!s) return;
  s.todo = s.todo.map(t => t.id === tid ? {...t, [field]: val} : t);
  snSave();
  if(field === 'done' || field === 'priority') snRenderDetail();
}
function snDelTodo(tid) {
  const s = snSel(); if(!s) return;
  s.todo = s.todo.filter(t => t.id !== tid);
  snSave();
  snRenderDetail();
}

function snExport() {
  const blob = new Blob([JSON.stringify(SN.sessions, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'pf1e-notes.json'; a.click();
  URL.revokeObjectURL(url);
}
function snImport(e) {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(Array.isArray(d)) { SN.sessions = [...SN.sessions, ...d]; snSave(); snRender(); toast('Notities geimporteerd'); }
    } catch { toast('Fout bij importeren', '#e74c3c'); }
  };
  r.readAsText(f);
  e.target.value = '';
}

function renderSessionNotes(el) {
  snLoad();
  el.innerHTML = `<div id="notes-wrap">
    <div id="notes-sidebar">
      <div style="padding:8px 10px;border-bottom:1px solid var(--border);display:flex;gap:5px">
        <button class="gold" style="flex:1;font-size:11px" onclick="snNew()">+ Nieuwe sessie</button>
        <button style="padding:7px 9px;font-size:10px" onclick="snExport()">&#8595;</button>
        <label style="padding:7px 9px;font-size:10px;cursor:pointer;border:1px solid var(--border);border-radius:5px;color:var(--muted)">&#8593;<input type="file" accept=".json" style="display:none" onchange="snImport(event)"></label>
      </div>
      <div id="notes-list"></div>
    </div>
    <div id="notes-detail">
      <div class="empty-state"><div class="empty-icon">&#128221;</div><div class="empty-title">Selecteer een sessie</div><div class="empty-sub">Of maak een nieuwe aan</div></div>
    </div>
  </div>`;
  snRender();
}

function snRender() {
  const list = document.getElementById('notes-list');
  if(!list) return;
  if(!SN.sessions.length) {
    list.innerHTML = '<div style="padding:24px 11px;text-align:center;color:var(--dim);font-size:12px">Geen sessies<br>Maak een nieuwe aan</div>';
  } else {
    list.innerHTML = SN.sessions.map(s => {
      const qCount = (s.quests||[]).filter(q=>!q.done).length;
      const tCount = (s.todo||[]).filter(t=>!t.done).length;
      const sel = s.id === SN.activeId;
      return `<div class="notes-session-item${sel?' selected':''}" onclick="snSelect('${s.id}')">
        <div style="display:flex;align-items:center;gap:5px">
          <div class="notes-session-title" style="flex:1">${esc(s.title)}</div>
          <button onclick="event.stopPropagation();snDel('${s.id}')" style="background:transparent;border:none;color:#4a2020;cursor:pointer;font-size:12px;padding:0;font-family:inherit">&#x2715;</button>
        </div>
        <div class="notes-session-date">${esc(s.date||'')}${qCount?' · '+qCount+' quest':''}${tCount?' · '+tCount+' todo':''}</div>
      </div>`;
    }).join('');
  }
  snRenderDetail();
}

function snSelect(id) {
  SN.activeId = id;
  snSave();
  snRender();
}

function snRenderDetail() {
  const detail = document.getElementById('notes-detail');
  if(!detail) return;
  const s = snSel();
  if(!s) {
    detail.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128221;</div><div class="empty-title">Selecteer een sessie</div><div class="empty-sub">Of maak een nieuwe aan</div></div>';
    return;
  }

  const PRIORITY_COLORS = {open:'#4a9eff', active:'#f39c12', done:'#2ecc71', blocked:'#e74c3c'};
  const PRIORITY_LABELS = {open:'Open', active:'Actief', done:'Klaar', blocked:'Geblokkeerd'};
  const TODO_PRIO_COLORS = {low:'#5a7a5a', normal:'#9ab8d8', high:'#e67e22', urgent:'#e74c3c'};
  const TODO_PRIO_LABELS = {low:'Laag', normal:'Normaal', high:'Hoog', urgent:'Urgent'};

  detail.innerHTML = `
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,#1a1208,#111310);display:flex;align-items:center;gap:9px;flex-shrink:0">
      <input class="cinzel" style="flex:1;font-size:15px;color:var(--gold);background:transparent;border:none;padding:2px 0;outline:none" value="${esc(s.title)}" onchange="snUpd('title',this.value);snRender()" placeholder="Sessie naam...">
      <input type="date" style="background:transparent;border:none;color:var(--muted);font-family:inherit;font-size:11px;outline:none" value="${esc(s.date||'')}" onchange="snUpd('date',this.value);snRender()">
    </div>
    <div class="notes-tab-row">
      <button class="notes-tab${SN.activeTab==='notes'?' active':''}" onclick="SN.activeTab='notes';snRenderDetail()">&#128221; Notities</button>
      <button class="notes-tab${SN.activeTab==='quests'?' active':''}" onclick="SN.activeTab='quests';snRenderDetail()">&#127942; Quests <span style="font-size:9px;opacity:.7">${(s.quests||[]).filter(q=>!q.done).length||''}</span></button>
      <button class="notes-tab${SN.activeTab==='todo'?' active':''}" onclick="SN.activeTab='todo';snRenderDetail()">&#9989; Todo <span style="font-size:9px;opacity:.7">${(s.todo||[]).filter(t=>!t.done).length||''}</span></button>
    </div>
    <div class="notes-body" id="notes-tab-body"></div>`;

  const body = document.getElementById('notes-tab-body');
  if(!body) return;

  if(SN.activeTab === 'notes') {
    body.innerHTML = `
      <div>
        <label>Sessie samenvatting / recap</label>
        <textarea class="notes-textarea" style="min-height:90px" placeholder="Wat is er gebeurd deze sessie?" onchange="snUpd('notes',this.value)">${esc(s.notes||'')}</textarea>
      </div>
      <div>
        <label>Verhaallijnen &amp; hooks</label>
        <textarea class="notes-textarea" style="min-height:70px" placeholder="Lopende verhaallijnen, onbeantwoorde vragen, hints..." onchange="snUpd('storylines',this.value)">${esc(s.storylines||'')}</textarea>
      </div>
      <div>
        <label>Rewards &amp; XP</label>
        <textarea class="notes-textarea" style="min-height:50px" placeholder="Uitgedeelde XP, goud, items..." onchange="snUpd('rewards',this.value)">${esc(s.rewards||'')}</textarea>
      </div>`;
  }

  else if(SN.activeTab === 'quests') {
    const quests = s.quests || [];
    const open = quests.filter(q => !q.done);
    const done = quests.filter(q => q.done);
    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
        <div class="section-label" style="margin:0;flex:1">Actieve quests (${open.length})</div>
        <button class="gold" style="font-size:11px;padding:5px 10px" onclick="snAddQuest()">+ Quest</button>
      </div>
      ${open.length ? open.map(q => snQuestRow(q, PRIORITY_COLORS, PRIORITY_LABELS)).join('') : '<div style="color:var(--dim);font-size:12px;padding:10px 0">Geen open quests</div>'}
      ${done.length ? `<div class="section-label" style="margin-top:10px">Afgerond (${done.length})</div>
        ${done.map(q => snQuestRow(q, PRIORITY_COLORS, PRIORITY_LABELS)).join('')}` : ''}`;
  }

  else if(SN.activeTab === 'todo') {
    const todos = s.todo || [];
    const open = todos.filter(t => !t.done);
    const done = todos.filter(t => t.done);
    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
        <div class="section-label" style="margin:0;flex:1">GM Todo (${open.length})</div>
        <button class="gold" style="font-size:11px;padding:5px 10px" onclick="snAddTodo()">+ Item</button>
      </div>
      ${open.length ? open.map(t => snTodoRow(t, TODO_PRIO_COLORS, TODO_PRIO_LABELS)).join('') : '<div style="color:var(--dim);font-size:12px;padding:10px 0">Geen open items</div>'}
      ${done.length ? `<div class="section-label" style="margin-top:10px">Klaar (${done.length})</div>
        ${done.map(t => snTodoRow(t, TODO_PRIO_COLORS, TODO_PRIO_LABELS)).join('')}` : ''}`;
  }
}

function snQuestRow(q, PRIORITY_COLORS, PRIORITY_LABELS) {
  const pCol = PRIORITY_COLORS[q.priority||'open'] || '#888';
  const pLbl = PRIORITY_LABELS[q.priority||'open'] || 'Open';
  const nextPriority = {open:'active', active:'done', done:'blocked', blocked:'open'};
  return `<div class="quest-item">
    <input type="checkbox" class="quest-check" ${q.done?'checked':''} onchange="snUpdQuest('${q.id}','done',this.checked)">
    <textarea class="quest-text${q.done?' done':''}" rows="1" style="height:auto;overflow:hidden" onInput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onchange="snUpdQuest('${q.id}','text',this.value)" placeholder="Quest beschrijving...">${esc(q.text||'')}</textarea>
    <span class="todo-priority" style="color:${pCol};border-color:${pCol}55;background:${pCol}18" onclick="snUpdQuest('${q.id}','priority','${nextPriority[q.priority||'open']}')" title="Klik om status te wisselen">${pLbl}</span>
    <button class="quest-del" onclick="snDelQuest('${q.id}')">&#x2715;</button>
  </div>`;
}

function snTodoRow(t, PRIO_COLORS, PRIO_LABELS) {
  const pCol = PRIO_COLORS[t.priority||'normal'] || '#888';
  const pLbl = PRIO_LABELS[t.priority||'normal'] || 'Normaal';
  const nextPrio = {low:'normal', normal:'high', high:'urgent', urgent:'low'};
  return `<div class="quest-item">
    <input type="checkbox" class="quest-check" ${t.done?'checked':''} onchange="snUpdTodo('${t.id}','done',this.checked)">
    <textarea class="quest-text${t.done?' done':''}" rows="1" style="height:auto;overflow:hidden" onInput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onchange="snUpdTodo('${t.id}','text',this.value)" placeholder="Todo omschrijving...">${esc(t.text||'')}</textarea>
    <span class="todo-priority" style="color:${pCol};border-color:${pCol}55;background:${pCol}18" onclick="snUpdTodo('${t.id}','priority','${nextPrio[t.priority||'normal']}')" title="Klik om prioriteit te wisselen">${pLbl}</span>
    <button class="quest-del" onclick="snDelTodo('${t.id}')">&#x2715;</button>
  </div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const monsters = window.MONSTERS||[];
  document.getElementById('monster-count-label').textContent = `Pathfinder 1e · ${monsters.length.toLocaleString()} monsters`;
  updateTopbar();
  renderSidebar();
  updateModuleHeader();
  renderModule();
});
</script>
